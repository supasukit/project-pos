<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ข้อมูลลูกค้า</title>
  <link rel="stylesheet" href="customers.css" />
</head>
<body>
  <header>
    <h1 onclick="location.href='index.html'" style="cursor: pointer;">POS</h1>
    <nav>
      <button onclick="location.href='dashboard.html'">DASHBOARD</button>
      <button class="active" onclick="location.href='customers.html'">ข้อมูลลูกค้า</button>
      <button onclick="location.href='products.html'">ข้อมูลสินค้า</button>
      <button id="profile-btn">...</button>
    </nav>
  </header>

  <main>
    <aside class="sidebar">
      <button class="user" id="add-customer-btn">➕ เพิ่มรายชื่อ</button>
      <button class="user" id="cash-customers-btn">💰 ลูกค้าจ่ายเงินสด</button>
      <button class="user" id="pending-customers-btn">⏰ ลูกค้าค้างชำระ</button>
      <button class="user" id="payment-btn">💳 จ่ายเงินค้างชำระ</button>
    </aside>

    <section class="customer-list" id="customer-list">
      <!-- การ์ดลูกค้าจะถูกเพิ่มที่นี่ -->
    </section>
  </main>

  <!-- ✅ Popup แสดงข้อมูลลูกค้า -->
  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <span class="close" onclick="closePopup()">&times;</span>
      <div id="popup-info"></div>
    </div>
  </div>

  <!-- Popup สำหรับจ่ายเงินค้างชำระ -->
  <div id="payment-popup" class="popup hidden">
    <div class="popup-content">
      <span class="close" onclick="closePaymentPopup()">&times;</span>
      <h2>จ่ายเงินค้างชำระ</h2>
      <div id="payment-info">
        <!-- รายการลูกค้าที่ค้างชำระจะแสดงที่นี่ -->
      </div>
    </div>
  </div>

  <script src="customers.js"></script>
</body>
</html>
