<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เพิ่มสินค้า</title>
  <link rel="stylesheet" href="add-product.css" />
</head>
<body>
  <h2>เพิ่มสินค้าใหม่</h2>

  <form id="product-form">
    <!-- ✅ ข้อมูลพื้นฐาน -->
    <div class="basic-group">
      <label for="name">📝 ชื่อสินค้า</label>
      <input type="text" id="name" placeholder="กรอกชื่อสินค้า" required />
      
      <label for="barcode">🏷️ บาร์โค้ด</label>
      <input type="text" id="barcode" placeholder="กรอกหมายเลขบาร์โค้ด" required />
    </div>
    
    <!-- ✅ กลุ่มราคาขาย -->
    <div class="price-group">
      <label>💰 ราคาขาย</label>
      
      <label for="retail_price">💵 ราคาขายปลีก (บาท)</label>
      <input type="number" id="retail_price" placeholder="0" required />
      
      <label for="wholesale_price">📦 ราคาขายส่ง (บาท)</label>
      <input type="number" id="wholesale_price" placeholder="0" />
      
      <label for="credit_price">⏰ ราคาขายเงินค้างชำระ (บาท)</label>
      <input type="number" id="credit_price" placeholder="0" />
    </div>
    
    <!-- ✅ กลุ่มจำนวน -->
    <div class="quantity-group">
      <label>📦 จำนวนและเงื่อนไข</label>
      
      <label for="wholesale_minimum">🔢 จำนวนขั้นต่ำขายส่ง (ชิ้น)</label>
      <input type="number" id="wholesale_minimum" placeholder="0" />
      
      <label for="stock">📋 จำนวนคงเหลือ (ชิ้น)</label>
      <input type="number" id="stock" placeholder="0" required />
    </div>
    
    <!-- ✅ กลุ่มข้อมูลเพิ่มเติม -->
    <div class="info-group">
      <label>📋 ข้อมูลเพิ่มเติม</label>
      
      <label for="category">🗂️ หมวดหมู่สินค้า</label>
      <select id="category" required>
        <option value="">เลือกหมวดหมู่สินค้า</option>
        <option value="ยาฆ่าหญ้า24d">🌿 ยาฆ่าหญ้า24d</option>
        <option value="ยาคุมเลน">🛡️ ยาคุมเลน</option>
        <option value="ยาคุมฆ่า">💀 ยาคุมฆ่า</option>
        <option value="ยาเก็บ">🏺 ยาเก็บ</option>
        <option value="ยาฆ่าแมลง">🐛 ยาฆ่าแมลง</option>
        <option value="ยาเชื้อรา">🍄 ยาเชื้อรา</option>
        <option value="ฮอร์โมน">⚗️ ฮอร์โมน</option>
        <option value="ปุ๋ยเกล็ด">💎 ปุ๋ยเกล็ด</option>
        <option value="จับใบ">🍃 จับใบ</option>
        <option value="ปุ๋ย">🌱 ปุ๋ย</option>
        <option value="ยาย่อยฟาง">🌾 ยาย่อยฟาง</option>
        <option value="ยาคุมข้าวโพด">🌽 ยาคุมข้าวโพด</option>
        <option value="ยาหว่านแมลง">🦟 ยาหว่านแมลง</option>
        <option value="ยาหว่านหญ้า">🌿 ยาหว่านหญ้า</option>
      </select>
      
      <label for="image">🖼️ รูปภาพสินค้า (ไม่จำเป็น)</label>
      <input type="file" id="image" accept="image/*" />
    </div>
    
    <button type="submit">✅ เพิ่มสินค้า</button>
  </form>

  <script src="add-product.js"></script>
</body>
</html>
